<!DOCTYPE html>
<html>
<head>
    <title>Antigravity on Cloud Run</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, monospace;
            background: #141210;
            color: #c9c5c0;
            padding: 16px clamp(8px, 2vw, 16px);
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
        }
        h1 {
            font-size: 20px;
            font-weight: normal;
        }
        h1 span { color: #d4a55a; }
        h1 em { color: #8b949e; font-style: normal; }
        .new-btn {
            background: transparent;
            border: 1px solid #3a5040;
            color: #70a080;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-size: 14px;
        }
        .new-btn:hover {
            background: #3a5040;
            color: #c9c5c0;
        }
        .table-wrapper {
            overflow-x: auto;
            margin-bottom: 24px;
            max-width: 100%;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }
        th, td {
            padding: 8px 12px;
            text-align: left;
            border-bottom: 1px solid #2a2724;
        }
        th {
            color: #8b949e;
            font-weight: normal;
            font-size: 12px;
        }
        td a {
            color: #d4a55a;
            text-decoration: none;
        }
        td a:hover { text-decoration: underline; }
        .sessions th:nth-child(4), .sessions td:nth-child(4) { width: 85px; }
        .sessions td:nth-child(2) {
            max-width: 30vw;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            direction: rtl;
            text-align: left;
        }
        .info-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 1px solid #555;
            font-size: 10px;
            font-style: italic;
            font-family: serif;
            color: #888;
            cursor: help;
            vertical-align: middle;
            margin-left: -2px;
            position: relative;
            top: -1px;
        }
        .info-icon:hover { color: #ccc; border-color: #999; }
        .info-icon .tooltip {
            display: none;
            position: absolute;
            top: calc(100% + 6px);
            right: 0;
            background: #2a2724;
            border: 1px solid #444;
            color: #ccc;
            font-size: 12px;
            font-style: normal;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, monospace;
            padding: 6px 10px;
            border-radius: 4px;
            white-space: nowrap;
            z-index: 10;
        }
        .info-icon:hover .tooltip { display: block; }
        .volume {
            color: #b0b8c0;
            font-size: 12px;
            max-width: 250px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            direction: rtl;
            text-align: left;
        }
        .volume:hover {
            max-width: none;
            overflow: visible;
            white-space: normal;
            word-break: break-all;
            direction: ltr;
        }
        .frames {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }
        .frames.single {
            grid-template-columns: 1fr;
        }
        @media (max-width: 900px) {
            .frames {
                grid-template-columns: 1fr;
            }
        }
        .frame {
            background: #1c1917;
            border: 1px solid #2a2724;
            border-radius: 6px;
            overflow: hidden;
        }
        .frame-bar {
            padding: 8px 12px;
            border-bottom: 1px solid #2a2724;
            display: flex;
            justify-content: space-between;
            font-size: 12px;
        }
        .frame-actions {
            display: flex;
            gap: 12px;
        }
        .frame-bar a {
            color: #d4a55a;
            text-decoration: none;
        }
        iframe {
            width: 100%;
            height: 400px;
            border: none;
            background: #000;
        }
        .empty {
            color: #8b949e;
            padding: 32px 16px;
            text-align: center;
            max-width: 700px;
            margin: 0 auto;
        }
        .empty > p {
            font-size: 20px;
            margin-bottom: 24px;
        }
        .help {
            margin: 0 auto;
            border-collapse: collapse;
            max-width: 100%;
        }
        .help td {
            padding: 8px 12px;
            font-size: 16px;
            vertical-align: top;
        }
        .help td:first-child {
            max-width: 350px;
            word-break: break-all;
        }
        .help code {
            color: #c9c5c0;
        }
        .help td:last-child {
            color: #6b6560;
            word-wrap: break-word;
        }
        .tip {
            margin-top: 24px;
            font-size: 13px;
            color: #6b6560;
        }
        .stop-btn {
            background: transparent;
            border: 1px solid #5c4033;
            color: #a08070;
            padding: 2px 6px;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-size: 12px;
        }
        .stop-btn:hover:not(:disabled) {
            background: #5c4033;
            color: #c9c5c0;
        }
        .stop-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .inactive {
            color: #6b6560;
        }
        .inactive-row td {
            opacity: 0.6;
        }
        .session-name {
            color: #c9c5c0;
            text-decoration: none;
        }
        .session-name:hover {
            color: #d4a55a;
        }
        .delete-btn {
            background: transparent;
            border: 1px solid #4a3030;
            color: #a07070;
            padding: 2px 6px;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-size: 12px;
        }
        .delete-btn:hover {
            background: #4a3030;
            color: #c9c5c0;
        }
        .start-btn {
            background: transparent;
            border: 1px solid #3a5040;
            color: #70a080;
            padding: 2px 6px;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-size: 12px;
        }
        .start-btn:hover {
            background: #3a5040;
            color: #c9c5c0;
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: #1c1917;
            border: 1px solid #2a2724;
            border-radius: 8px;
            padding: 24px;
            min-width: 400px;
            max-width: 90vw;
        }
        .modal h2 {
            font-size: 16px;
            font-weight: normal;
            margin-bottom: 6px;
            color: #c9c5c0;
        }
        .modal-subtitle {
            font-size: 12px;
            color: #6b6560;
            margin-bottom: 20px;
        }
        .modal-field {
            margin-bottom: 16px;
        }
        .modal-field label {
            display: block;
            font-size: 12px;
            color: #8b949e;
            margin-bottom: 6px;
        }
        .modal-field input[type="text"] {
            width: 100%;
            padding: 8px 10px;
            background: #141210;
            border: 1px solid #2a2724;
            border-radius: 4px;
            color: #c9c5c0;
            font-family: inherit;
            font-size: 14px;
        }
        .modal-field input[type="text"]:focus {
            outline: none;
            border-color: #3a5040;
        }
        .modal-field input[type="text"]::placeholder {
            color: #6b6560;
        }
        .modal-hint {
            font-size: 11px;
            color: #6b6560;
            margin-top: 4px;
        }
        .modal-hint.error {
            color: #a07070;
        }
        .modal-field input[type="text"].error {
            border-color: #4a3030;
        }
        .modal-field-checkbox {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
        }
        .modal-field-checkbox input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: #70a080;
            color-scheme: dark;
        }
        .modal-field-checkbox label {
            font-size: 14px;
            color: #c9c5c0;
            cursor: pointer;
        }
        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 24px;
        }
        .modal-cancel {
            background: transparent;
            border: 1px solid #2a2724;
            color: #8b949e;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-size: 14px;
        }
        .modal-cancel:hover {
            background: #2a2724;
            color: #c9c5c0;
        }
        .modal-submit {
            background: #3a5040;
            border: 1px solid #3a5040;
            color: #c9c5c0;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-size: 14px;
        }
        .modal-submit:hover:not(:disabled) {
            background: #4a6050;
        }
        .modal-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .modal.creating .modal-field input,
        .modal.creating .modal-field-checkbox input {
            opacity: 0.5;
            pointer-events: none;
        }
        .modal.creating .modal-cancel {
            opacity: 0.5;
            pointer-events: none;
        }
        .zone-title { font-size: 13px; text-transform: uppercase; letter-spacing: 2px; opacity: 0.5; margin: 28px 0 10px; }
        .zone-header { display: flex; align-items: center; justify-content: space-between; margin-top: 36px; }
        .zone-header .zone-title { margin: 0; }
        .proxy-btn { cursor: pointer; }
        .cloud-badge { font-size: 10px; padding: 2px 6px; border: 1px solid currentColor; border-radius: 3px; opacity: 0.6; margin-left: 6px; }
        .frame-body { position: relative; flex: 1; display: flex; }
        .frame-body iframe { flex: 1; width: 100%; border: 0; }
        .frame-loading { position: absolute; inset: 0; z-index: 2; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; text-align: center; padding: 24px; cursor: pointer; background: #1a1a1a; color: #bbb; }
        .frame-loading p { margin: 0; font-size: 14px; letter-spacing: 1px; }
        .frame-loading-sub { max-width: 340px; font-size: 12px; opacity: 0.55; letter-spacing: 0; }
        .spinner { width: 26px; height: 26px; border: 3px solid rgba(255,255,255,0.15); border-top-color: #e0913a; border-radius: 50%; animation: spin 0.9s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
    <script>
        let activeConfirm = null;
        function stopSession(name, btn) {
            // If already confirming, do the stop
            if (btn.dataset.confirming === 'true') {
                btn.disabled = true;
                btn.textContent = 'stopping';
                fetch('/api/stop', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name })
                }).then(() => {
                    // Update row to inactive
                    const row = document.querySelector(`tr[data-name="${name}"]`);
                    if (row) {
                        row.classList.add('inactive-row');
                        row.querySelector('td:nth-child(2)').innerHTML = `<button class="start-btn" onclick="startSession('${name}')">start</button>`;
                        row.querySelector('td:nth-child(4)').innerHTML = `<button class="delete-btn" onclick="deleteSession('${name}', this)">delete</button>`;
                    }
                    // Remove iframe
                    const frame = document.getElementById(`frame-${name}`);
                    if (frame) frame.remove();
                    updateFramesLayout();
                });
                return;
            }

            // Cancel any other active confirm
            if (activeConfirm && activeConfirm !== btn) {
                resetButton(activeConfirm);
            }

            // Show confirm state
            btn.dataset.confirming = 'true';
            btn.dataset.originalText = btn.textContent;
            btn.textContent = 'stop?';
            activeConfirm = btn;

            // Auto-cancel after 3 seconds
            btn.timeout = setTimeout(() => resetButton(btn), 3000);
        }

        function resetButton(btn) {
            if (btn.timeout) clearTimeout(btn.timeout);
            btn.dataset.confirming = 'false';
            btn.textContent = btn.dataset.originalText || 'stop';
            if (activeConfirm === btn) activeConfirm = null;
        }

        // Click elsewhere to cancel
        document.addEventListener('click', (e) => {
            if (activeConfirm && !activeConfirm.contains(e.target)) {
                resetButton(activeConfirm);
            }
        });

        // Stop from iframe header (same logic, works with links)
        function stopSessionLink(name, link) {
            if (link.dataset.confirming === 'true') {
                link.style.opacity = '0.5';
                link.style.pointerEvents = 'none';
                link.textContent = 'stopping';
                fetch('/api/stop', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name })
                }).then(() => {
                    // Update row to inactive
                    const row = document.querySelector(`tr[data-name="${name}"]`);
                    if (row) {
                        row.classList.add('inactive-row');
                        row.querySelector('td:nth-child(2)').innerHTML = `<button class="start-btn" onclick="startSession('${name}')">start</button>`;
                        row.querySelector('td:nth-child(4)').innerHTML = `<button class="delete-btn" onclick="deleteSession('${name}', this)">delete</button>`;
                    }
                    // Remove iframe
                    const frame = document.getElementById(`frame-${name}`);
                    if (frame) frame.remove();
                    updateFramesLayout();
                });
                return;
            }

            if (activeConfirm && activeConfirm !== link) {
                resetButton(activeConfirm);
            }

            link.dataset.confirming = 'true';
            link.dataset.originalText = link.textContent;
            link.textContent = 'stop?';
            activeConfirm = link;

            link.timeout = setTimeout(() => resetButton(link), 3000);
        }
        function deleteSession(name, btn) {
            // If already confirming, do the delete
            if (btn.dataset.confirming === 'true') {
                fetch('/api/delete', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name })
                }).then(() => {
                    // Remove row
                    const row = document.querySelector(`tr[data-name="${name}"]`);
                    if (row) row.remove();
                    // Remove iframe if exists
                    const frame = document.getElementById(`frame-${name}`);
                    if (frame) frame.remove();
                    updateFramesLayout();
                    // Reload if no sessions left
                    const remaining = document.querySelectorAll('.sessions tbody tr');
                    if (remaining.length === 0) location.reload();
                });
                return;
            }

            // Cancel any other active confirm
            if (activeConfirm && activeConfirm !== btn) {
                resetButton(activeConfirm);
            }

            // Show confirm state
            btn.dataset.confirming = 'true';
            btn.dataset.originalText = btn.textContent;
            btn.textContent = 'delete?';
            activeConfirm = btn;

            // Auto-cancel after 3 seconds
            btn.timeout = setTimeout(() => resetButton(btn), 3000);
        }
        async function startSession(name) {
            const res = await fetch('/api/start', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name })
            });
            const data = await res.json();
            if (data.success) {
                const row = document.querySelector(`tr[data-name="${name}"]`);
                if (row) {
                    const url = data.url || row.dataset.url;
                    const displayUrl = url.replace('http://', '');
                    row.classList.remove('inactive-row');
                    row.querySelector('td:nth-child(2)').innerHTML = `<a href="${url}" target="_blank">${displayUrl}</a>`;
                    row.querySelector('td:nth-child(4)').innerHTML = `<button class="stop-btn" onclick="stopSession('${name}', this)">stop</button>`;
                    // Add iframe (only if not already present)
                    const displayName = name.replace('agrun-', '');
                    let frames = document.querySelector('.frames');
                    // Create frames container if it doesn't exist
                    if (!frames) {
                        const tableWrapper = document.querySelector('.table-wrapper');
                        if (tableWrapper) {
                            tableWrapper.insertAdjacentHTML('afterend', '<div class="frames single"></div>');
                            frames = document.querySelector('.frames');
                        }
                    }
                    if (frames && !document.getElementById(`frame-${name}`)) {
                        frames.insertAdjacentHTML('beforeend', `
                            <div class="frame" id="frame-${name}">
                                <div class="frame-bar">
                                    <span>${displayName}</span>
                                    <div class="frame-actions">
                                        <a href="#" class="frame-stop" onclick="stopSessionLink('${name}', this); return false;">stop</a>
                                        <a href="#" onclick="document.querySelector('#frame-${name} iframe').src='${url}'; return false;">refresh</a>
                                        <a href="${url}" target="_blank">open</a>
                                    </div>
                                </div>
                                <iframe src="${url}"></iframe>
                            </div>
                        `);
                    }
                }
            }
        }

        // SSE connection for real-time updates when containers change externally
        const events = new EventSource('/api/events');
        events.onmessage = (e) => {
            // Reload page when containers are created/modified outside the dashboard
            if (['create', 'start', 'stop', 'die', 'destroy'].includes(e.data)) {
                location.reload();
            }
        };

        function updateFramesLayout() {
            const frames = document.querySelector('.frames');
            if (frames) {
                const count = frames.querySelectorAll('.frame').length;
                frames.classList.toggle('single', count === 1);
            }
        }

        function openNewSessionModal() {
            document.getElementById('new-session-modal').classList.add('open');
            document.getElementById('session-name').focus();
            validateSessionName();
        }

        function closeNewSessionModal() {
            document.getElementById('new-session-modal').classList.remove('open');
            // Reset form
            document.getElementById('session-name').value = '';
            document.getElementById('session-volume').value = '';
            document.getElementById('session-query').value = '';
            document.getElementById('session-open-tab').checked = false;
            clearSessionNameError();
        }

        function getExistingSessionNames() {
            const rows = document.querySelectorAll('.sessions tbody tr[data-name]');
            return Array.from(rows).map(row => row.dataset.name.replace('agrun-', ''));
        }

        function sessionNameExists(name) {
            return getExistingSessionNames().includes(name);
        }

        function showSessionNameError(name) {
            const input = document.getElementById('session-name');
            const hint = document.getElementById('session-name-hint');
            input.classList.add('error');
            hint.classList.add('error');
            hint.textContent = `session "${name}" already seems to exist`;
        }

        function clearSessionNameError() {
            const input = document.getElementById('session-name');
            const hint = document.getElementById('session-name-hint');
            input.classList.remove('error');
            hint.classList.remove('error');
            hint.textContent = 'use a unique name to create a new session';
        }

        function validateSessionName() {
            const input = document.getElementById('session-name');
            const pos = input.selectionStart;
            const had = input.value;
            input.value = input.value.replace(/ /g, '-').toLowerCase();
            if (input.value !== had) input.setSelectionRange(pos, pos);
            const name = input.value.trim() || 'default';
            if (sessionNameExists(name)) {
                showSessionNameError(name);
            } else {
                clearSessionNameError();
            }
        }

        async function submitNewSession() {
            const name = document.getElementById('session-name').value.replace(/ /g, '-').toLowerCase().trim() || 'default';
            const volume = document.getElementById('session-volume').value.trim();
            const query = document.getElementById('session-query').value.trim();
            const openTab = document.getElementById('session-open-tab').checked;

            // Check if session already exists
            if (sessionNameExists(name)) {
                showSessionNameError(name);
                return;
            }

            const modal = document.querySelector('#new-session-modal .modal');
            const btn = modal.querySelector('.modal-submit');
            modal.classList.add('creating');
            btn.disabled = true;
            btn.textContent = 'creating...';

            const res = await fetch('/api/create', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, volume, query, openTab })
            });
            const data = await res.json();
            if (data.success) {
                closeNewSessionModal();
                if (openTab && data.url) {
                    window.open(data.url, '_blank');
                }
                location.reload();
            } else {
                modal.classList.remove('creating');
                btn.disabled = false;
                btn.textContent = 'create';
                alert(data.error || 'Failed to create session');
            }
        }

        function showSessionInfo(name) {
            const displayName = name.replace('agrun-', '');
            document.getElementById('session-info-title').textContent = displayName;
            document.getElementById('session-exec-cmd').value = `docker exec -it ${name} tmux attach -t main`;
            document.getElementById('session-info-modal').classList.add('open');
        }

        function closeSessionInfoModal() {
            document.getElementById('session-info-modal').classList.remove('open');
        }

        function copyExecCmd() {
            const cmd = document.getElementById('session-exec-cmd').value;
            navigator.clipboard.writeText(cmd);
            const btn = document.querySelector('#session-info-modal .modal-submit');
            btn.textContent = 'copied';
            setTimeout(() => btn.textContent = 'copy', 1500);
        }

        // Close modal on escape, submit on Enter
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeNewSessionModal();
                closeSessionInfoModal();
            }
            if (e.key === 'Enter' && document.getElementById('new-session-modal').classList.contains('open')) {
                e.preventDefault();
                submitNewSession();
            }
        });

        // Close modal on overlay click
        document.addEventListener('click', (e) => {
            if (e.target.classList.contains('modal-overlay')) {
                closeNewSessionModal();
                closeSessionInfoModal();
            }
        });


        // === Cloud sessions ===

        function openNewCloudModal() { document.getElementById('new-cloud-modal').classList.add('open'); }
        function closeNewCloudModal() { document.getElementById('new-cloud-modal').classList.remove('open'); }

        async function loadCloudSessions() {
            const el = document.getElementById('cloud-content');
            if (!el) return;
            try {
                const res = await fetch('/api/cloud-sessions');
                const data = await res.json();
                if (!data.configured) {
                    el.innerHTML = '<div class="empty"><p>no cloud config yet - run <code>./scripts/deploy-cloud.sh</code> once to set up</p></div>';
                    return;
                }
                if (data.error) {
                    el.innerHTML = `<div class="empty"><p>cloud error: ${data.error}</p></div>`;
                    return;
                }
                if (data.sessions.length === 0) {
                    el.innerHTML = '<div class="empty"><p>no cloud sessions</p></div>';
                    return;
                }
                const rows = data.sessions.map(s => {
                    const status = s.deploying ? 'deploying...' : (s.connected ? 'connected' : (s.ready ? 'ready' : 'not ready'));
                    const badge = s.alwaysOn ? '<span class="cloud-badge">always-on</span>' : '<span class="cloud-badge">scale-to-zero</span>';
                    let connect = '-';
                    if (s.ready && !s.deploying) {
                        connect = s.connected
                            ? `<a href="${s.url}" target="_blank">${s.url.replace('http://', '')}</a>`
                            : `<button class="start-btn" onclick="connectCloudSession('${s.name}', this)">connect</button>`;
                    }
                    const del = s.deploying ? '' : (s.connected
                        ? `<button class="stop-btn" onclick="disconnectCloudSession('${s.name}', this)">disconnect</button>`
                        : `<button class="delete-btn" onclick="deleteCloudSession('${s.name}', this)">delete</button>`);
                    return `<tr class="${s.connected ? '' : 'inactive-row'}" data-cloud-name="${s.name}" data-cloud-url="${s.url || ''}">
                        <td>${s.displayName}${badge}</td>
                        <td>${status}</td>
                        <td class="volume">${connect}</td>
                        <td>${del}</td>
                    </tr>`;
                }).join('');
                el.innerHTML = `<div class="table-wrapper"><table class="sessions">
                    <thead><tr><th>Session</th><th>Status</th><th>Connect</th><th></th></tr></thead>
                    <tbody>${rows}</tbody></table></div>`;

                // Live iframes for connected cloud sessions (via the local proxy)
                const connected = data.sessions.filter(s => s.connected && s.url);
                const framesHtml = connected.map(s => `
                    <div class="frame" id="cloud-frame-${s.name}">
                        <div class="frame-bar">
                            <span>${s.displayName} <span class="cloud-badge">cloud</span></span>
                            <div class="frame-actions">
                                <a href="#" onclick="disconnectCloudSession('${s.name}'); return false;">disconnect</a>
                                <a href="#" onclick="document.querySelector('#cloud-frame-${s.name} iframe').src='${s.url}'; return false;">refresh</a>
                                <a href="${s.url}" target="_blank">open</a>
                            </div>
                        </div>
                        <div class="frame-body">
                            <div class="frame-loading" onclick="this.remove()">
                                <div class="spinner"></div>
                                <p>cold starting</p>
                                <p class="frame-loading-sub">Cloud Run is booting agy in the container. This clears automatically once the terminal is ready.</p>
                            </div>
                            <iframe src="${s.url}"></iframe>
                        </div>
                    </div>`).join('');
                let framesEl = document.getElementById('cloud-frames');
                if (!framesEl) {
                    framesEl = document.createElement('div');
                    framesEl.id = 'cloud-frames';
                    el.after(framesEl);
                }
                framesEl.className = 'frames' + (connected.length === 1 ? ' single' : '');
                // Only rebuild iframes when the connected set changes, so we don't
                // reload a live terminal on every poll
                const key = connected.map(s => s.name + s.url).join(',');
                if (framesEl.dataset.key !== key) {
                    framesEl.innerHTML = framesHtml;
                    framesEl.dataset.key = key;
                }
                // Drop each cold-start overlay the moment the server confirms agy
                // has actually painted in that session (not a fixed timer)
                connected.forEach(s => {
                    if (s.terminalReady) {
                        const ov = document.querySelector(`#cloud-frame-${s.name} .frame-loading`);
                        if (ov) ov.remove();
                    }
                });
                // While any connected session is still booting, poll quickly so the
                // overlay clears promptly; otherwise fall back to the 30s cadence
                if (connected.some(s => !s.terminalReady)) {
                    clearTimeout(window._cloudFastPoll);
                    window._cloudFastPoll = setTimeout(loadCloudSessions, 2000);
                }
            } catch (e) {
                el.innerHTML = '<div class="empty"><p>dashboard server unreachable</p></div>';
            }
        }

        async function connectCloudSession(name, btn) {
            if (btn) { btn.disabled = true; btn.textContent = 'connecting...'; }
            const res = await fetch('/api/cloud-connect', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name })
            });
            const data = await res.json();
            if (!data.success && btn) { btn.disabled = false; btn.textContent = 'connect'; alert('connect failed: ' + (data.error || 'unknown')); return; }
            loadCloudSessions();
        }

        async function disconnectCloudSession(name, btn) {
            if (btn) { btn.disabled = true; btn.textContent = 'disconnecting...'; }
            await fetch('/api/cloud-disconnect', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name })
            });
            loadCloudSessions();
        }

        async function submitNewCloudSession() {
            const name = document.getElementById('cloud-session-name').value.trim() || 'default';
            const zeroScale = document.getElementById('cloud-zero-scale').checked;
            closeNewCloudModal();
            await fetch('/api/cloud-create', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, zeroScale })
            });
            loadCloudSessions();
        }

        async function deleteCloudSession(name, btn) {
            if (!confirm(`Delete cloud session ${name}? Session data in its GCS bucket is kept.`)) return;
            btn.disabled = true; btn.textContent = 'deleting...';
            await fetch('/api/cloud-delete', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name })
            });
            loadCloudSessions();
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', loadCloudSessions);
        } else {
            loadCloudSessions();
        }
        setInterval(loadCloudSessions, 30000);
    </script>
</head>
<body>
    <header>
        <h1><span>agrun</span> <em>sessions</em></h1>
        <button class="new-btn" onclick="openNewSessionModal()">+ new</button>
    </header>
    <h2 class="zone-title">local</h2>
    {{CONTENT}}

    <div class="zone-header">
        <h2 class="zone-title">cloud</h2>
        <button class="new-btn" onclick="openNewCloudModal()">+ new</button>
    </div>
    <div id="cloud-content"><div class="empty"><p>checking cloud sessions...</p></div></div>

    <div id="new-cloud-modal" class="modal-overlay">
        <div class="modal">
            <h2>new cloud session</h2>
            <p class="modal-subtitle">deploys a Cloud Run service (takes a few minutes)</p>
            <div class="modal-field">
                <label for="cloud-session-name">session name</label>
                <input type="text" id="cloud-session-name" placeholder="default">
                <p class="modal-hint">lowercase letters, digits, dashes</p>
            </div>
            <div class="modal-field-checkbox">
                <input type="checkbox" id="cloud-zero-scale" checked>
                <label for="cloud-zero-scale">scale to zero when idle (cheaper; resume with agy -c)</label>
            </div>
            <div class="modal-actions">
                <button class="modal-cancel" onclick="closeNewCloudModal()">cancel</button>
                <button class="modal-submit" onclick="submitNewCloudSession()">deploy</button>
            </div>
        </div>
    </div>

    <div id="new-session-modal" class="modal-overlay">
        <div class="modal">
            <h2>new session</h2>
            <p class="modal-subtitle">each session runs in its own isolated container</p>
            <div class="modal-field">
                <label for="session-name">session name</label>
                <input type="text" id="session-name" placeholder="default" oninput="validateSessionName()">
                <p class="modal-hint" id="session-name-hint">use a unique name to create a new session</p>
            </div>
            <div class="modal-field">
                <label for="session-volume">volume mount</label>
                <input type="text" id="session-volume" placeholder="~/myproject:/home/agrun/myproject">
            </div>
            <div class="modal-field">
                <label for="session-query">initial query</label>
                <input type="text" id="session-query" placeholder="Research topic X...">
            </div>
            <div class="modal-field-checkbox">
                <input type="checkbox" id="session-open-tab">
                <label for="session-open-tab">open in new tab</label>
            </div>
            <div class="modal-actions">
                <button class="modal-cancel" onclick="closeNewSessionModal()">cancel</button>
                <button class="modal-submit" onclick="submitNewSession()">create</button>
            </div>
        </div>
    </div>

    <div id="session-info-modal" class="modal-overlay">
        <div class="modal">
            <h2 id="session-info-title">session</h2>
            <div class="modal-field">
                <label>enter container</label>
                <input type="text" id="session-exec-cmd" readonly onclick="this.select()">
            </div>
            <div class="modal-actions">
                <button class="modal-cancel" onclick="closeSessionInfoModal()">close</button>
                <button class="modal-submit" onclick="copyExecCmd()">copy</button>
            </div>
        </div>
    </div>
</body>
</html>
